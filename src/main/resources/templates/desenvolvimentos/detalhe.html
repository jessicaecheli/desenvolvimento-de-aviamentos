<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title th:text="${dev.codigo}">Detalhe</title></head>
<body>
<main th:fragment="content">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2>
                <span th:text="${dev.codigo}"></span>
                <span th:class="'badge badge-' + ${dev.status} + ' fs-6 ms-2'" th:text="${dev.status}"></span>
                <span th:if="${atrasado}" class="badge bg-danger ms-1">
                    <i class="bi bi-clock-history"></i> Atrasado <span th:text="${diasAtraso}"></span>d
                </span>
            </h2>
            <p class="text-muted mb-0" th:text="${dev.descricao}"></p>
            <small class="text-muted">
                <span th:if="${dev.marca}">Marca: <strong th:text="${dev.marca.nome}"></strong> &nbsp;</span>
                <span th:if="${dev.colecao}">Coleção: <strong th:text="${dev.colecao.nome}"></strong> &nbsp;</span>
                <span th:if="${dev.categoria}">Categoria: <strong th:text="${dev.categoria.nome}"></strong>
                    (prazo: <span th:text="${dev.categoria.prazoDiasUteis}"></span> d.u.)</span>
            </small>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/desenvolvimentos/{id}/editar(id=${dev.id})}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-pencil"></i> Editar
            </a>
            <a href="/desenvolvimentos" class="btn btn-outline-dark btn-sm">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <div class="row g-4">
        <!-- Timeline de Etapas -->
        <div class="col-md-5">
            <div class="card shadow-sm h-100">
                <div class="card-header fw-semibold"><i class="bi bi-clock-history"></i> Histórico de Etapas</div>
                <div class="card-body p-3">
                    <div th:if="${#lists.isEmpty(etapas)}" class="text-muted">Nenhuma etapa registrada.</div>
                    <div class="timeline">
                        <div th:each="e : ${etapas}" class="d-flex gap-3 mb-3">
                            <div class="text-center" style="min-width:40px">
                                <span th:class="'badge rounded-pill badge-' + ${e.tipo}" th:text="${e.tipo}"></span>
                                <div class="text-muted small" th:text="${#temporals.format(e.dataOcorrencia,'dd/MM')}"></div>
                            </div>
                            <div>
                                <div th:if="${e.observacao}" class="small" th:text="${e.observacao}"></div>
                                <div th:if="${e.numeroRodada > 1}" class="small text-muted">
                                    Rodada <span th:text="${e.numeroRodada}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário Avançar Etapa -->
        <div class="col-md-4">
            <div class="card shadow-sm mb-3">
                <div class="card-header fw-semibold"><i class="bi bi-arrow-right-circle"></i> Registrar Etapa</div>
                <div class="card-body">
                    <form th:action="@{/desenvolvimentos/{id}/avancar(id=${dev.id})}" method="post">
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Tipo</label>
                            <select name="tipo" class="form-select" required>
                                <option th:each="t : ${tiposEtapa}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Data</label>
                            <input type="date" name="dataOcorrencia" class="form-control"
                                   th:value="${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}"/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Observação</label>
                            <textarea name="observacao" class="form-control" rows="2"></textarea>
                        </div>
                        <button class="btn btn-primary w-100">Registrar</button>
                    </form>
                </div>
            </div>

            <!-- Orçamentos -->
            <div class="card shadow-sm">
                <div class="card-header fw-semibold"><i class="bi bi-currency-dollar"></i> Orçamentos</div>
                <div class="card-body p-2">
                    <div th:if="${#lists.isEmpty(orcamentos)}" class="text-muted small p-2">Nenhum orçamento.</div>
                    <table th:unless="${#lists.isEmpty(orcamentos)}" class="table table-sm mb-2">
                        <thead><tr><th>#</th><th>Fornecedor</th><th>Valor</th><th>Qtd</th></tr></thead>
                        <tbody>
                            <tr th:each="o : ${orcamentos}">
                                <td th:text="${o.numero}"></td>
                                <td th:text="${o.fornecedor}"></td>
                                <td th:text="${o.valor != null ? 'R$ ' + #numbers.formatDecimal(o.valor,1,'COMMA',2,'DOT') : '-'}"></td>
                                <td th:text="${o.quantidade}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <button class="btn btn-sm btn-outline-secondary w-100" data-bs-toggle="collapse"
                            data-bs-target="#formOrc">
                        <i class="bi bi-plus"></i> Adicionar Orçamento
                    </button>
                    <div id="formOrc" class="collapse mt-2">
                        <form th:action="@{/desenvolvimentos/{id}/orcamento(id=${dev.id})}" method="post">
                            <div class="row g-1">
                                <div class="col-3">
                                    <input type="number" name="numero" class="form-control form-control-sm"
                                           placeholder="Nº" min="1" max="3" required/>
                                </div>
                                <div class="col-9">
                                    <input type="text" name="fornecedor" class="form-control form-control-sm"
                                           placeholder="Fornecedor"/>
                                </div>
                                <div class="col-6">
                                    <input type="number" name="valor" class="form-control form-control-sm"
                                           placeholder="Valor" step="0.01"/>
                                </div>
                                <div class="col-6">
                                    <input type="number" name="quantidade" class="form-control form-control-sm"
                                           placeholder="Qtd"/>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-sm btn-primary w-100">Salvar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

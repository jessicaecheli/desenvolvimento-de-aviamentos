<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title th:text="${dev.codigo}">Detalhe</title></head>
<body>
<main th:fragment="content">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2>
                <span th:text="${dev.codigo}"></span>
                <span th:class="'badge badge-' + ${dev.status} + ' fs-6 ms-2'" th:text="${dev.status}"></span>
                <span th:if="${atrasado}" class="badge bg-danger ms-1">
                    <i class="bi bi-clock-history"></i> Atrasado <span th:text="${diasAtraso}"></span>d
                </span>
            </h2>
            <p class="text-muted mb-0" th:text="${dev.descricao}"></p>
            <small class="text-muted">
                <span th:if="${dev.marca}">Marca: <strong th:text="${dev.marca.nome}"></strong> &nbsp;</span>
                <span th:if="${dev.colecao}">Coleção: <strong th:text="${dev.colecao.nomeCompleto}"></strong> &nbsp;</span>
                <span th:if="${dev.categoria}">Categoria: <strong th:text="${dev.categoria.nome}"></strong>
                    (prazo: <span th:text="${dev.categoria.prazoDiasUteis}"></span> d.u.)</span>
            </small>
            <small th:if="${dev.codigoSystextil1 != null or dev.codigoSystextil2 != null or dev.codigoSystextil3 != null}"
                   class="text-muted d-block">
                Systêxtil:
                <strong th:if="${dev.codigoSystextil1 != null}" th:text="${dev.codigoSystextil1}"></strong><span th:if="${dev.codigoSystextil1 != null and dev.codigoSystextil2 != null}"> / </span><strong th:if="${dev.codigoSystextil2 != null}" th:text="${dev.codigoSystextil2}"></strong><span th:if="${(dev.codigoSystextil1 != null or dev.codigoSystextil2 != null) and dev.codigoSystextil3 != null}"> / </span><strong th:if="${dev.codigoSystextil3 != null}" th:text="${dev.codigoSystextil3}"></strong>
            </small>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/desenvolvimentos/{id}/editar(id=${dev.id})}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-pencil"></i> Editar
            </a>
            <a href="/desenvolvimentos" class="btn btn-outline-dark btn-sm">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <div class="row g-4">
        <!-- Timeline de Etapas -->
        <div class="col-md-5">
            <div class="card shadow-sm h-100">
                <div class="card-header fw-semibold"><i class="bi bi-clock-history"></i> Histórico de Etapas</div>
                <div class="card-body p-3">
                    <div th:if="${#lists.isEmpty(etapas)}" class="text-muted">Nenhuma etapa registrada.</div>
                    <div class="timeline">
                        <div th:each="e : ${etapas}" class="d-flex gap-3 mb-3">
                            <div class="text-center" style="min-width:40px">
                                <span th:class="'badge rounded-pill badge-' + ${e.tipo}" th:text="${e.tipo}"></span>
                                <div class="text-muted small" th:text="${#temporals.format(e.dataOcorrencia,'dd/MM')}"></div>
                            </div>
                            <div>
                                <div th:if="${e.orcamento != null}" class="small fw-semibold">
                                    <i class="bi bi-building"></i>
                                    <span th:text="${e.orcamento.fornecedor ?: '(sem fornecedor)'}"></span>
                                </div>
                                <div th:if="${e.observacao}" class="small" th:text="${e.observacao}"></div>
                                <div th:if="${e.custoAmostra != null}" class="small text-warning fw-semibold">
                                    Custo: R$ <span th:text="${#numbers.formatDecimal(e.custoAmostra, 1, 'POINT', 2, 'COMMA')}"></span>
                                </div>
                                <div th:if="${e.numeroRodada > 1}" class="small text-muted">
                                    Rodada <span th:text="${e.numeroRodada}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulário Código Systêxtil + Registrar Etapa + Orçamentos -->
        <div class="col-md-4">
            <!-- Código Systêxtil -->
            <div class="card shadow-sm mb-3">
                <div class="card-header fw-semibold"><i class="bi bi-upc-scan"></i> Código Systêxtil</div>
                <div class="card-body">
                    <form th:action="@{/desenvolvimentos/{id}/systextil(id=${dev.id})}" method="post">
                        <div class="mb-2">
                            <input type="text" name="codigoSystextil1" class="form-control uppercase-input"
                                   th:value="${dev.codigoSystextil1}" placeholder="Código 1"/>
                        </div>
                        <div class="mb-2">
                            <input type="text" name="codigoSystextil2" class="form-control uppercase-input"
                                   th:value="${dev.codigoSystextil2}" placeholder="Código 2"/>
                        </div>
                        <div class="mb-2">
                            <input type="text" name="codigoSystextil3" class="form-control uppercase-input"
                                   th:value="${dev.codigoSystextil3}" placeholder="Código 3"/>
                        </div>
                        <button class="btn btn-primary w-100">Salvar</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm mb-3">
                <div class="card-header fw-semibold"><i class="bi bi-arrow-right-circle"></i> Registrar Etapa</div>
                <div class="card-body">
                    <form th:action="@{/desenvolvimentos/{id}/avancar(id=${dev.id})}" method="post">
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Tipo</label>
                            <select name="tipo" class="form-select">
                                <option value="">-- selecione a etapa --</option>
                                <option th:each="t : ${tiposEtapa}"
                                        th:if="${t.name() != 'INCLUSAO'}"
                                        th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <!-- Campo de fornecedor — aparece só para AMOSTRA, LIBERADA, APROVADO -->
                        <div class="mb-2" id="campoOrcamento" style="display:none">
                            <label class="form-label fw-semibold">Fornecedor da Amostra</label>
                            <select name="orcamentoId" class="form-select form-select-sm">
                                <option value="">(nenhum)</option>
                                <option th:each="o : ${orcamentos}"
                                        th:value="${o.id}"
                                        th:text="${o.fornecedor != null ? o.fornecedor : '(sem fornecedor)'}">
                                </option>
                            </select>
                        </div>
                        <!-- Custo da amostra — aparece só para AMOSTRA -->
                        <div class="mb-2" id="campoCustoAmostra" style="display:none">
                            <label class="form-label fw-semibold">Custo da Amostra (R$)</label>
                            <input type="number" name="custoAmostra" step="0.01" class="form-control" placeholder="0,00"/>
                        </div>
                        <input type="hidden" name="dataOcorrencia"
                               th:value="${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}"/>
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Observação</label>
                            <textarea name="observacao" class="form-control uppercase-input" rows="2"></textarea>
                        </div>
                        <button class="btn btn-primary w-100">Registrar</button>
                    </form>
                </div>
            </div>

            <!-- Orçamentos -->
            <div class="card shadow-sm">
                <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-currency-dollar"></i> Orçamentos</span>
                    <span class="badge bg-secondary" th:text="${totalOrcamentos} + '/4'"></span>
                </div>
                <div class="card-body p-2">
                    <div th:if="${#lists.isEmpty(orcamentos)}" class="text-muted small p-2">Nenhum orçamento.</div>
                    <div th:unless="${#lists.isEmpty(orcamentos)}" class="mb-2">
                        <div th:each="o : ${orcamentos}"
                             class="border rounded mb-2 overflow-hidden"
                             th:classappend="${o.id == menorOrcamentoId} ? ' border-success' : ''">

                            <!-- Header do mini-card -->
                            <div class="px-2 py-1 d-flex justify-content-between align-items-center"
                                 th:classappend="${o.id == menorOrcamentoId} ? ' bg-success-subtle' : ' bg-light'">
                                <span class="fw-semibold small" th:text="${o.fornecedor ?: '(sem fornecedor)'}"></span>
                                <div class="d-flex gap-1 align-items-center">
                                    <span th:if="${o.id == menorOrcamentoId}"
                                          class="badge bg-success" style="font-size:0.65rem">
                                        <i class="bi bi-star-fill"></i> Melhor
                                    </span>
                                    <button type="button" class="btn btn-sm btn-outline-secondary py-0 px-1"
                                            data-bs-toggle="collapse"
                                            th:data-bs-target="'#editOrc' + ${o.id}">
                                        <i class="bi bi-pencil" style="font-size:0.7rem"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Corpo: tamanhos e preços -->
                            <div class="px-2 pt-1">
                                <div th:if="${o.tamanho != null}" class="d-flex justify-content-between small">
                                    <span class="text-muted" th:text="${o.tamanho}"></span>
                                    <span class="fw-semibold"
                                          th:text="${o.valor != null ? 'R$ ' + #numbers.formatDecimal(o.valor, 1, 'POINT', 2, 'COMMA') : '-'}"></span>
                                </div>
                                <div th:if="${o.tamanho2 != null}" class="d-flex justify-content-between small">
                                    <span class="text-muted" th:text="${o.tamanho2}"></span>
                                    <span th:text="${o.valor2 != null ? 'R$ ' + #numbers.formatDecimal(o.valor2, 1, 'POINT', 2, 'COMMA') : '-'}"></span>
                                </div>
                                <div th:if="${o.tamanho3 != null}" class="d-flex justify-content-between small">
                                    <span class="text-muted" th:text="${o.tamanho3}"></span>
                                    <span th:text="${o.valor3 != null ? 'R$ ' + #numbers.formatDecimal(o.valor3, 1, 'POINT', 2, 'COMMA') : '-'}"></span>
                                </div>
                            </div>

                            <!-- Rodapé: qtd e observação -->
                            <div th:if="${o.quantidade != null or (o.observacao != null and !o.observacao.isEmpty())}"
                                 class="px-2 pb-1 pt-0 d-flex gap-2 small text-muted">
                                <span th:if="${o.quantidade != null}">Qtd: <strong th:text="${o.quantidade}"></strong></span>
                                <span th:if="${o.observacao != null and !o.observacao.isEmpty()}"
                                      class="text-truncate" th:text="${o.observacao}"></span>
                            </div>

                            <!-- Collapse de edição -->
                            <div th:id="'editOrc' + ${o.id}" class="collapse border-top">
                                <div class="p-2 bg-light">
                                    <form th:action="@{/desenvolvimentos/{devId}/orcamento/{orcId}/editar(devId=${dev.id},orcId=${o.id})}"
                                          method="post" class="row g-1">
                                        <div class="col-12">
                                            <select name="fornecedor" class="form-select form-select-sm">
                                                <option value="">(nenhum)</option>
                                                <option th:each="f : ${fornecedores}"
                                                        th:value="${f.nome}"
                                                        th:text="${f.nome}"
                                                        th:selected="${f.nome == o.fornecedor}">
                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-6">
                                            <input type="text" name="tamanho" class="form-control form-control-sm uppercase-input"
                                                   th:value="${o.tamanho}" placeholder="Tam. 1"/>
                                        </div>
                                        <div class="col-6">
                                            <input type="number" name="valor" step="0.01" class="form-control form-control-sm"
                                                   th:value="${o.valor}" placeholder="Preço T1"/>
                                        </div>
                                        <div class="col-6">
                                            <input type="text" name="tamanho2" class="form-control form-control-sm uppercase-input"
                                                   th:value="${o.tamanho2}" placeholder="Tam. 2"/>
                                        </div>
                                        <div class="col-6">
                                            <input type="number" name="valor2" step="0.01" class="form-control form-control-sm"
                                                   th:value="${o.valor2}" placeholder="Preço T2"/>
                                        </div>
                                        <div class="col-6">
                                            <input type="text" name="tamanho3" class="form-control form-control-sm uppercase-input"
                                                   th:value="${o.tamanho3}" placeholder="Tam. 3"/>
                                        </div>
                                        <div class="col-6">
                                            <input type="number" name="valor3" step="0.01" class="form-control form-control-sm"
                                                   th:value="${o.valor3}" placeholder="Preço T3"/>
                                        </div>
                                        <div class="col-12">
                                            <input type="number" name="quantidade" class="form-control form-control-sm"
                                                   th:value="${o.quantidade}" placeholder="Qtd"/>
                                        </div>
                                        <div class="col-12">
                                            <input type="text" name="observacao" class="form-control form-control-sm uppercase-input"
                                                   th:value="${o.observacao}" placeholder="Observação"/>
                                        </div>
                                        <div class="col-12">
                                            <button class="btn btn-sm btn-primary w-100">Salvar</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${totalOrcamentos < 4}">
                        <button class="btn btn-sm btn-outline-secondary w-100" data-bs-toggle="collapse"
                                data-bs-target="#formOrc">
                            <i class="bi bi-plus"></i> Adicionar Orçamento
                        </button>
                        <div id="formOrc" class="collapse mt-2">
                            <form th:action="@{/desenvolvimentos/{id}/orcamento(id=${dev.id})}" method="post">
                                <div class="row g-1">
                                    <div class="col-12">
                                        <select name="fornecedor" class="form-select form-select-sm">
                                            <option value="">(nenhum)</option>
                                            <option th:each="f : ${fornecedores}"
                                                    th:value="${f.nome}"
                                                    th:text="${f.nome}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" name="tamanho" class="form-control form-control-sm uppercase-input"
                                               placeholder="Tam. 1 (P, 38...)"/>
                                    </div>
                                    <div class="col-6">
                                        <input type="number" name="valor" step="0.01" class="form-control form-control-sm"
                                               placeholder="Preço T1"/>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" name="tamanho2" class="form-control form-control-sm uppercase-input"
                                               placeholder="Tam. 2"/>
                                    </div>
                                    <div class="col-6">
                                        <input type="number" name="valor2" step="0.01" class="form-control form-control-sm"
                                               placeholder="Preço T2"/>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" name="tamanho3" class="form-control form-control-sm uppercase-input"
                                               placeholder="Tam. 3"/>
                                    </div>
                                    <div class="col-6">
                                        <input type="number" name="valor3" step="0.01" class="form-control form-control-sm"
                                               placeholder="Preço T3"/>
                                    </div>
                                    <div class="col-12">
                                        <input type="number" name="quantidade" class="form-control form-control-sm"
                                               placeholder="Qtd"/>
                                    </div>
                                    <div class="col-12">
                                        <textarea name="observacao" class="form-control form-control-sm uppercase-input"
                                                  rows="2" placeholder="Observação"></textarea>
                                    </div>
                                    <div class="col-12">
                                        <button class="btn btn-sm btn-primary w-100">Salvar</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div th:if="${totalOrcamentos >= 4}" class="text-muted small p-2 text-center">
                        <i class="bi bi-info-circle"></i> Limite de 4 orçamentos atingido.
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    (function () {
        const tiposComOrc = ['AMOSTRA', 'LIBERADA', 'APROVADO'];
        const tipoSelect  = document.querySelector('select[name="tipo"]');
        const campoOrc    = document.getElementById('campoOrcamento');
        const campoCusto  = document.getElementById('campoCustoAmostra');
        function atualizar() {
            campoOrc.style.display   = tiposComOrc.includes(tipoSelect.value) ? '' : 'none';
            campoCusto.style.display = tipoSelect.value === 'AMOSTRA' ? '' : 'none';
        }
        tipoSelect.addEventListener('change', atualizar);
        atualizar();
    }());
    </script>
</main>
</body>
</html>

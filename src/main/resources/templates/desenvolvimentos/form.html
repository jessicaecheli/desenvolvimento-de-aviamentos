<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Desenvolvimento</title></head>
<body>
<main th:fragment="content">
    <h2 th:text="${desenvolvimento.id == null ? 'Novo Desenvolvimento' : 'Editar Desenvolvimento'}"></h2>
    <div class="card shadow-sm p-4 mt-3" style="max-width:600px">
        <form action="/desenvolvimentos/salvar" method="post">
            <input type="hidden" name="id" th:value="${desenvolvimento.id}"/>
            <div class="mb-3">
                <label class="form-label fw-semibold">Código *</label>
                <input type="text" name="codigo" class="form-control uppercase-input"
                       th:value="${desenvolvimento.codigo}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Descrição</label>
                <input type="text" name="descricao" class="form-control uppercase-input"
                       th:value="${desenvolvimento.descricao}"/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Marca</label>
                <select name="marcaId" class="form-select">
                    <option value="">-- selecione --</option>
                    <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nome}"
                            th:selected="${desenvolvimento.marca != null and desenvolvimento.marca.id == m.id}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Coleção</label>
                <select name="colecaoId" class="form-select">
                    <option value="">-- selecione --</option>
                    <option th:each="c : ${colecoes}" th:value="${c.id}" th:text="${c.nomeCompleto}"
                            th:selected="${desenvolvimento.colecao != null and desenvolvimento.colecao.id == c.id}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Categoria</label>
                <select id="selectMaster" class="form-select mb-2">
                    <option value="">-- selecione a categoria --</option>
                    <option th:each="m : ${categoriasMaster}" th:value="${m.id}" th:text="${m.nome}"
                            th:selected="${desenvolvimento.categoria != null and desenvolvimento.categoria.categoriaPai != null and desenvolvimento.categoria.categoriaPai.id == m.id}"></option>
                </select>
                <div id="wrapSubcategoria" style="display:none" class="mt-2">
                    <select id="selectSubcategoria" name="categoriaId" class="form-select">
                        <option value="">-- selecione a subcategoria --</option>
                        <option th:each="s : ${subcategorias}"
                                th:value="${s.id}"
                                th:text="${s.nome}"
                                th:attr="data-master=${s.categoriaPai.id}"
                                th:selected="${desenvolvimento.categoria != null and desenvolvimento.categoria.id == s.id}"></option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select">
                    <option th:each="s : ${statusValues}"
                            th:if="${s.name() != 'NOVO'}"
                            th:value="${s}" th:text="${s}"
                            th:selected="${desenvolvimento.status == s}"></option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary">Salvar</button>
                <a href="/desenvolvimentos" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
<script>
(function () {
    const master = document.getElementById('selectMaster');
    const sub    = document.getElementById('selectSubcategoria');
    const wrap   = document.getElementById('wrapSubcategoria');
    const allOpts = Array.from(sub.options).slice(1); // exclui o placeholder

    function filtrar() {
        const masterId = master.value;
        // mostra/oculta o campo de subcategoria
        wrap.style.display = masterId ? 'block' : 'none';
        if (!masterId) sub.value = '';
        // remove todas exceto placeholder
        while (sub.options.length > 1) sub.remove(1);
        allOpts.forEach(function(opt) {
            if (!masterId || opt.dataset.master === masterId) {
                sub.add(opt.cloneNode(true));
            }
        });
    }

    master.addEventListener('change', function() {
        sub.value = '';
        filtrar();
    });

    // Na carga da página, filtra pelo master já selecionado (modo edição)
    filtrar();
})();
</script>
</main>
</body>
</html>

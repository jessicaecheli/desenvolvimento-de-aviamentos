<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Desenvolvimentos</title></head>
<body>
<main th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-list-check"></i> Desenvolvimentos</h2>
        <a href="/desenvolvimentos/novo" class="btn btn-primary"><i class="bi bi-plus"></i> Novo</a>
    </div>

    <!-- Filtros -->
    <form method="get" action="/desenvolvimentos" class="card p-3 mb-4 shadow-sm"
          style="position:sticky; top:0; z-index:50; background:#fff;">
        <div class="row g-2">
            <div class="col-md-2">
                <label class="form-label fw-semibold">Código</label>
                <input type="text" name="codigo" class="form-control uppercase-input"
                       placeholder="Ex: AV001" th:value="${filtroCodigo}"/>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Coleção</label>
                <select name="colecaoId" class="form-select">
                    <option value="">Todas</option>
                    <option th:each="c : ${colecoes}" th:value="${c.id}" th:text="${c.nomeCompleto}"
                            th:selected="${filtroColecaoId != null and filtroColecaoId == c.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Marca</label>
                <select name="marcaIds" class="form-select">
                    <option value="">Todas</option>
                    <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nome}"
                            th:selected="${filtroMarcaId != null and filtroMarcaId == m.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Categoria</label>
                <select id="filtroMaster" name="categoriaMasterId" class="form-select">
                    <option value="">Todas</option>
                    <option th:each="m : ${categoriasMaster}" th:value="${m.id}" th:text="${m.nome}"
                            th:selected="${filtroCategoriaMasterId != null and filtroCategoriaMasterId == m.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Subcategoria</label>
                <select id="filtroSubcategoria" name="categoriaId" class="form-select">
                    <option value="">Todas</option>
                    <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nome}"
                            th:attr="data-master=${c.categoriaPai.id}"
                            th:selected="${filtroCategoriaId != null and filtroCategoriaId == c.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Status</label>
                <select name="status" class="form-select">
                    <option value="">Todos</option>
                    <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s.label}"
                            th:selected="${filtroStatus != null and filtroStatus == s}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Fornecedor</label>
                <input type="text" name="fornecedor" class="form-control"
                       placeholder="Nome do fornecedor" th:value="${filtroFornecedor}"/>
            </div>
            <div class="col-md-2 d-flex align-items-end gap-2">
                <button class="btn btn-outline-primary w-100">Filtrar</button>
                <a href="/desenvolvimentos" class="btn btn-outline-secondary" title="Limpar filtros">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Código</th><th>Descrição</th><th>Marca</th>
                    <th>Coleção</th><th>Categoria</th><th>Status</th>
                    <th>Fornecedor</th><th>Criado em</th><th>Prev. Amostra</th><th class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(desenvolvimentos)}">
                    <td colspan="10" class="text-center text-muted py-3">Nenhum desenvolvimento encontrado.</td>
                </tr>
                <tr th:each="d : ${desenvolvimentos}">
                    <td>
                        <a th:href="@{/desenvolvimentos/{id}(id=${d.id})}" th:text="${d.codigo}"
                           class="fw-semibold text-decoration-none"></a>
                    </td>
                    <td th:text="${d.descricao}"></td>
                    <td>
                        <span th:each="m,s : ${d.marcas}" th:text="${m.nome + (s.last ? '' : ', ')}"></span>
                    </td>
                    <td th:text="${d.colecao?.nomeCompleto}"></td>
                    <td th:text="${d.categoria?.nome}"></td>
                    <td>
                        <span th:class="'badge badge-' + ${d.status}" th:text="${d.status.label}"></span>
                    </td>
                    <td th:text="${fornecedoresPorDev[d.id]}"></td>
                    <td th:text="${#temporals.format(d.dataCriacao,'dd/MM/yyyy')}"></td>
                    <td th:text="${d.previsaoAmostra != null ? #temporals.format(d.previsaoAmostra,'dd/MM/yyyy') : (previsaoAmostraPorDev[d.id] != null ? #temporals.format(previsaoAmostraPorDev[d.id],'dd/MM/yyyy') : '-')}"></td>
                    <td class="text-end">
                        <a th:href="@{/desenvolvimentos/{id}(id=${d.id})}" class="btn btn-sm btn-outline-info">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a th:if="${d.status.name() == 'APROVADO'}"
                           th:href="@{/desenvolvimentos/{id}/ficha(id=${d.id})}"
                           class="btn btn-sm btn-outline-success" title="Ficha Técnica">
                            <i class="bi bi-file-text"></i>
                        </a>
                        <a th:href="@{/desenvolvimentos/{id}/editar(id=${d.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/desenvolvimentos/{id}/excluir(id=${d.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Excluir desenvolvimento?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
<script>
(function () {
    const master = document.getElementById('filtroMaster');
    const sub    = document.getElementById('filtroSubcategoria');
    const allOpts = Array.from(sub.options).slice(1);

    function filtrar() {
        const masterId = master.value;
        while (sub.options.length > 1) sub.remove(1);
        allOpts.forEach(function(opt) {
            if (!masterId || opt.dataset.master === masterId) {
                sub.add(opt.cloneNode(true));
            }
        });
    }

    master.addEventListener('change', function() {
        sub.value = '';
        filtrar();
    });

    filtrar();
})();
</script>
</main>
</body>
</html>

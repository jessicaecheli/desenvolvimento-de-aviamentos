<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Marcas</title></head>
<body>
<main th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-tag"></i> Marcas</h2>
        <a href="/marcas/nova" class="btn btn-primary"><i class="bi bi-plus"></i> Nova Marca</a>
    </div>
    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr><th>Nome</th><th class="text-end">Ações</th></tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(marcas)}">
                    <td colspan="2" class="text-center text-muted py-3">Nenhuma marca cadastrada.</td>
                </tr>
                <tr th:each="m : ${marcas}">
                    <td th:text="${m.nome}"></td>
                    <td class="text-end">
                        <a th:href="@{/marcas/{id}/editar(id=${m.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/marcas/{id}/excluir(id=${m.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Excluir marca?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Marca</title></head>
<body>
<main th:fragment="content">
    <h2 th:text="${marca.id == null ? 'Nova Marca' : 'Editar Marca'}"></h2>
    <div class="card shadow-sm p-4 mt-3" style="max-width:500px">
        <form action="/marcas/salvar" method="post">
            <input type="hidden" name="id" th:value="${marca.id}"/>
            <div class="mb-3">
                <label class="form-label fw-semibold">Nome</label>
                <input type="text" name="nome" class="form-control uppercase-input" th:value="${marca.nome}" required/>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary">Salvar</button>
                <a href="/marcas" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>

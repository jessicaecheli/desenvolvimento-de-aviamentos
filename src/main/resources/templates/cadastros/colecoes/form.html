<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Coleção</title></head>
<body>
<main th:fragment="content">
    <h2 th:text="${colecao.id == null ? 'Nova Coleção' : 'Editar Coleção'}"></h2>
    <div class="card shadow-sm p-4 mt-3" style="max-width:500px">
        <form action="/colecoes/salvar" method="post">
            <input type="hidden" name="id" th:value="${colecao.id}"/>
            <div class="mb-3">
                <label class="form-label fw-semibold">Nome</label>
                <input type="text" name="nome" class="form-control" th:value="${colecao.nome}" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Ano</label>
                <input type="number" name="ano" class="form-control" th:value="${colecao.ano}"/>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary">Salvar</button>
                <a href="/colecoes" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>

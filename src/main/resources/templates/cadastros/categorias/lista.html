<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Subcategorias</title></head>
<body>
<main th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-grid"></i> Subcategorias</h2>
        <a href="/categorias/nova" class="btn btn-primary"><i class="bi bi-plus"></i> Nova Subcategoria</a>
    </div>
    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr><th>Categoria</th><th>Nome</th><th>Prazo (dias úteis)</th><th class="text-end">Ações</th></tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(subcategorias)}">
                    <td colspan="4" class="text-center text-muted py-3">Nenhuma subcategoria cadastrada.</td>
                </tr>
                <tr th:each="c : ${subcategorias}">
                    <td th:text="${c.categoriaPai != null ? c.categoriaPai.nome : ''}"></td>
                    <td th:text="${c.nome}"></td>
                    <td th:text="${c.prazoDiasUteis}"></td>
                    <td class="text-end">
                        <a th:href="@{/categorias/{id}/editar(id=${c.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/categorias/{id}/excluir(id=${c.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Excluir subcategoria?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>

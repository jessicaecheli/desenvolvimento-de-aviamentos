<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Tipos de Tecido</title></head>
<body>
<main th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-palette"></i> Tipos de Tecido</h2>
        <a href="/tipos-estampa/novo" class="btn btn-primary"><i class="bi bi-plus"></i> Novo Tipo de Tecido</a>
    </div>
    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr><th>Nome</th><th class="text-end">Ações</th></tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(tiposEstampa)}">
                    <td colspan="2" class="text-center text-muted py-3">Nenhum tipo de tecido cadastrado.</td>
                </tr>
                <tr th:each="t : ${tiposEstampa}">
                    <td th:text="${t.nome}"></td>
                    <td class="text-end">
                        <a th:href="@{/tipos-estampa/{id}/editar(id=${t.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/tipos-estampa/{id}/excluir(id=${t.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Excluir tipo de tecido?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
